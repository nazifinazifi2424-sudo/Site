<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:90%;
max-width:380px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#ff7a00;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Free Account</h2>

<input placeholder="Email">
<input type="password" placeholder="Password">
<input type="password" placeholder="Confirm Password">

<button>Create Account</button>

</div>

</body>
</html>
