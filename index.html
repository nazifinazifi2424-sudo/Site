<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aslm Movies & Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --red:#e10600;
  --green:#1faa59;
  --dark:#222;
}
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:Arial, sans-serif;
  background:#fff;
  color:#333;
}

/* HEADER */
header{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:18px 20px;
}

.menu-btn{
  font-size:30px;
  cursor:pointer;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
font-family:Arial;
}

.hero h1{
font-size:35px;
color:#0a4c57;
}

.hero p{
margin-top:15px;
color:#777;
font-size:18px;
}

.start-btn{
margin-top:30px;
padding:15px 30px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-70%;
  width:70%;
  height:100%;
  background:#fff;
  box-shadow:-5px 0 20px rgba(0,0,0,.15);
  padding:30px 20px;
  transition:.3s;
  z-index:10;
}

.side-menu a{
  display:block;
  margin-bottom:22px;
  font-size:18px;
  color:#222;
  text-decoration:none;
}

/* LOGIN MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.login-box{
  background:#fff;
  width:90%;
  max-width:360px;
  padding:25px;
  border-radius:14px;
}

.login-box h2{
  color:var(--red);
  text-align:center;
  margin-bottom:15px;
}

.login-box input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:8px;
}

.login-box button{
  width:100%;
  padding:12px;
  border:none;
  background:var(--green);
  color:#fff;
  font-size:16px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<section class="hero">
<h1>A Better Way To Collect Payments</h1>
<p>Our system has simplified how customers get movies and affordable data with ease.</p>
<button class="start-btn" onclick="window.location.href='register.html'">Create Free Account</button>
</section>

<div class="side-menu" id="menu">
  <a href="index.html">Home</a>
  <a href="#">Dashboard</a>
  <a href="#">About</a>
  <a href="#" onclick="openLogin()">Login</a>
  <a href="register.html">Register</a>
</div>

<div class="modal" id="loginModal" onclick="closeLogin(event)">
  <div class="login-box">
    <h2>Login</h2>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Sign In</button>
  </div>
</div>

<script>
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.right = (m.style.right==="0px") ? "-70%" : "0px";
}

function openLogin(){
  document.getElementById("loginModal").style.display="flex";
  document.getElementById("menu").style.right="-70%";
}

function closeLogin(e){
  if(e.target.id==="loginModal")
    e.target.style.display="none";
}
</script>

</body>
</html>
