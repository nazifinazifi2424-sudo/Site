<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aslm Movies & Data</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --red:#e10600;
  --green:#1faa59;
  --dark:#222;
}
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:Arial, sans-serif;
  background:#fff;
  color:#333;
}

/* HEADER */
header{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:18px 20px;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:bold;
}

.menu-icon span{
  display:block;
  width:25px;
  height:3px;
  margin:4px 0;
}

.menu-icon span:nth-child(1){ background:#ff7a00; }
.menu-icon span:nth-child(2){ background:#1faa59; }
.menu-icon span:nth-child(3){ background:#e10600; }

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
font-family:Arial;
}

.hero h1{
font-size:35px;
color:#0a4c57;
}

.hero p{
margin-top:15px;
color:#777;
font-size:18px;
}

.start-btn{
margin-top:30px;
padding:15px 30px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  right:-70%;
  width:70%;
  height:100%;
  background:#fff;
  box-shadow:-5px 0 20px rgba(0,0,0,.15);
  padding:30px 20px;
  transition:.3s;
  z-index:10;
}

.side-menu a{
  display:block;
  margin-bottom:22px;
  font-size:18px;
  color:#222;
  text-decoration:none;
}

/* LOGIN PAGE */
.login-page{
display:none;
padding:40px 20px;
background:#0a4c57;
min-height:100vh;
}

.login-box{
background:#fff;
max-width:400px;
margin:auto;
padding:25px;
border-radius:20px;
}

.login-box h2{
text-align:center;
margin-bottom:10px;
color:var(--red);
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

.login-box button{
width:100%;
padding:14px;
border:none;
background:var(--green);
color:#fff;
font-size:16px;
border-radius:8px;
}

.login-links{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

/* REGISTER PAGE */
.register-page{
display:none;
padding:40px 20px;
background:#0a4c57;
min-height:100vh;
}

.register-box{
background:#fff;
max-width:400px;
margin:auto;
padding:25px;
border-radius:20px;
}

.register-box h2{
text-align:center;
margin-bottom:10px;
}

.register-box p{
text-align:center;
color:#777;
margin-bottom:20px;
}

.register-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

.register-btn{
width:100%;
padding:14px;
background:linear-gradient(90deg,#ffb066,#ff7a00);
border:none;
color:#fff;
font-size:16px;
border-radius:8px;
}

.password-strength{
font-size:13px;
margin-bottom:10px;
}

.error{
color:red;
font-size:13px;
}
.success{
color:green;
font-size:13px;
}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">
<div class="menu-icon">
<span></span>
<span></span>
<span></span>
</div>
MENU
</div>
</header>

<section class="hero" id="hero">
<h1>A Better Way To Collect Payments</h1>
<p>Our system has simplified how customers get movies and affordable data with ease.</p>
<button class="start-btn" onclick="openRegister()">Create Free Account</button>
</section>

<!-- LOGIN PAGE -->
<section class="login-page" id="loginPage">

<div class="login-box">

<h2>Login</h2>

<input placeholder="Username">
<input type="password" placeholder="Password">

<button>Sign In</button>

<div class="login-links">
<a href="#">Forget Password?</a>
<a href="#" onclick="openRegister()">Create Account</a>
</div>

</div>

</section>

<!-- REGISTER PAGE -->
<section class="register-page" id="registerPage">

<div class="register-box">

<h2>Create account</h2>
<p>Let's get you started with your account.</p>

<form id="registerForm">

<input name="firstName" placeholder="First Name" required>
<input name="lastName" placeholder="Last Name" required>
<input name="username" placeholder="Username" required>
<input name="phone" placeholder="Phone Number" required>
<input name="email" type="email" placeholder="Email Address" required>

<input id="password" name="password" type="password" placeholder="Password" required>
<div id="strength" class="password-strength"></div>

<input id="confirmPassword" type="password" placeholder="Confirm Password" required>

<label style="font-size:14px">
<input type="checkbox" id="terms"> I accept terms
</label>

<button class="register-btn">Create my account</button>

</form>

<p style="margin-top:15px;text-align:center">
Already have an account? 
<a href="#" onclick="openLogin()">Log In</a>
</p>

</div>

</section>

<div class="side-menu" id="menu">
<a href="#">Home</a>
<a href="#">Dashboard</a>
<a href="#">About</a>
<a href="#" onclick="openLogin()">Login</a>
<a href="#" onclick="openRegister()">Register</a>
</div>

<script>

function toggleMenu(){
const m = document.getElementById("menu");
m.style.right = (m.style.right==="0px") ? "-70%" : "0px";
}

function openLogin(){
document.getElementById("hero").style.display="none";
document.getElementById("registerPage").style.display="none";
document.getElementById("loginPage").style.display="block";
document.getElementById("menu").style.right="-70%";
}

function openRegister(){
document.getElementById("hero").style.display="none";
document.getElementById("loginPage").style.display="none";
document.getElementById("registerPage").style.display="block";
document.getElementById("menu").style.right="-70%";
}

function backHome(){
document.getElementById("registerPage").style.display="none";
document.getElementById("loginPage").style.display="none";
document.getElementById("hero").style.display="block";
}

/* PASSWORD CHECK */

const password = document.getElementById("password")
const strength = document.getElementById("strength")

password.addEventListener("input",function(){

const value = password.value

const hasUpper = /[A-Z]/.test(value)
const hasLower = /[a-z]/.test(value)
const hasNumber = /[0-9]/.test(value)

if(value.length < 6){
strength.innerHTML="<span class='error'>Weak password</span>"
}
else if(hasUpper && hasLower && hasNumber){
strength.innerHTML="<span class='success'>Strong password</span>"
}
else{
strength.innerHTML="<span class='error'>Use uppercase, lowercase and number</span>"
}

})

/* REGISTER SUBMIT */

document.getElementById("registerForm").addEventListener("submit",async function(e){

e.preventDefault()

const terms=document.getElementById("terms")

if(!terms.checked){
alert("You must accept the terms")
return
}

const pass=document.getElementById("password").value
const confirm=document.getElementById("confirmPassword").value

if(pass!==confirm){
alert("Passwords do not match")
return
}

const formData = new FormData(this)
const data = Object.fromEntries(formData)

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})

const result = await res.json()

alert(result.message)

})

</script>

</body>
</html>
